name: Deploy to CF Pages
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --legacy-peer-deps
      # P2-4 audit: lint en CI para que los errores no se acumulen silenciosos.
      # Falla el build si hay errores nuevos.
      - run: npm run lint
      - run: npm run build
      - run: npx wrangler pages deploy dist --project-name koai-chat --branch main --commit-message "${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
